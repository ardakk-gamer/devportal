<!-- login.html içeriği -->
<div class="card">
    <h2>Echospark Login</h2>
    <input type="text" id="username" placeholder="Kullanıcı Adı">
    <input type="password" id="devKey" placeholder="Şifre">
    <button onclick="girisYap()">Sisteme Giriş</button>
</div>

<script>
async function girisYap() {
    const u = document.getElementById('username').value;
    const p = document.getElementById('devKey').value;
    
    // Python sunucuna (dev_panel.py veya yeni backend'ine) istek at
    const response = await fetch('/kontrol-noktasi', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ kullanici_adi: u, dev_key: p })
    });
    
    if (response.ok) {
        window.location.href = '/dashboard.html'; // Giriş başarılıysa dashboard'a at
    } else {
        alert("Yetkisiz Giriş!");
    }
}
</script>
